<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Beaker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..600&display=swap" rel="stylesheet">
<style>
/* Art direction: clean white + green — fresh, botanical, airy */

:root {
  --color-bg:             #ffffff;
  --color-surface:        #ffffff;
  --color-surface-2:      #fff1cc;
  --color-surface-offset: #fff1cc;
  --color-surface-dynamic:#fff1cc;
  --color-divider:        #E9E9E9;
  --color-border:         #E9E9E9;
  --color-text:           #202120;
  --color-text-muted:     #9b9b9b;
  --color-text-faint:     #767676;
  --color-text-inverse:   #ffffff;
  --color-primary:        #faae20;
  --color-primary-hover:  #faae20;
  --color-primary-active: #faae20;
  --color-primary-highlight: #fff1cc;
  --color-error:          #8b2a2a;
  --radius-sm: 0.25rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px oklch(0.25 0.06 145 / 0.07);
  --shadow-md: 0 4px 14px oklch(0.25 0.06 145 / 0.09);
  --shadow-lg: 0 12px 36px oklch(0.25 0.06 145 / 0.12);
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --font-display: 'Georgia', serif;
  --font-body: 'Arial', 'Helvetica Neue', sans-serif;
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
  --space-0: 0.00rem;
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem; --space-20: 5rem; --space-40: 15rem;
  --content-default: 1000px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.6;
}
img, svg { display: block; max-width: 100%;}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a, button, [role="button"] { transition: color var(--transition-interactive), background var(--transition-interactive), opacity var(--transition-interactive); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }  
  
/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: color-mix(in oklch, var(--color-bg) 90%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-4) var(--space-8);
  padding-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  display: flex; align-items: center; gap: var(--space-3);
  font-family: var(--font-display);
  font-size: var(--text-xl);
  letter-spacing: -0.01em;
  color: var(--color-text);
  text-decoration: none;
}
.header-right { display: flex; align-items: center; gap: var(--space-4); }

.view-nav {
  background: var(--color-surface);
  padding-top: var(--space-12); padding-bottom: var(--space-4);
  margin:auto;
  max-width: var(--content-default);
}
.view-nav-left { display: flex; gap: var(--space-2); }

.status-dot {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-xs); font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--color-text-muted);
}
.dot { width: 7px; height: 7px; border-radius: var(--radius-full); background: var(--color-text-faint); transition: background 0.4s; }
.dot.live { background: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-highlight); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.45} }

/* ── Main ── */
main { color: var(--colour-surface); max-width: var(--content-default); margin:auto; margin-bottom: var(--space-40);}

/* ── Stats ── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-0);
}
.stat-card {
  background: #f5f5f5;
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-6);
}
.stat-label { font-size: 0.65em; color: var(--color-text-muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: var(--space-1); }
.stat-value { font-family: var(--font-display); font-size: var(--text-xl); color: var(--color-text); line-height: 1.0; }
.stat-sub { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: var(--space-);}

/* ── Section header ── */
.section-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: var(--space-6);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--color-divider);
}
.section-title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 400;  }
.section-meta { font-size: var(--text-xs); color: var(--color-text-faint); }

/* ── Filter bar ── */
.log-expand-btn {
  display: block; width: 100%; margin-top: var(--space-2);
  padding: var(--space-3) var(--space-4) ;
  border-radius: var(--radius-lg);
  font-size: var(--text-xs); font-weight: 600;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  text-align: center; cursor: pointer;
}
.log-expand-btn:hover { background: var(--color-surface-offset); color: var(--color-text); border-color: var(--color-primary); }

.view-toggle {
  display: flex; align-items: center; gap: var(--space-2);
  margin-bottom: var(--space-6);
}
.view-btn {
  padding: var(--space-2) var(--space-5);
  border-radius: var(--radius-full);
  font-size: var(--text-xs); font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
}
.view-btn:hover { background: var(--color-surface-offset); color: var( --color-primary-hover); border-color: var(--color-primary); }
.view-btn.active { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }

.filter-bar { display: flex; gap: var(--space-2); margin-bottom: var(--space-6); padding-top: var(--space-4)}
.filter-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  font-size: var(--text-xs); font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
}
.filter-btn:hover { background: var(--color-surface-offset); color: var( --color-primary-hover); border-color: var(--color-primary); }
.filter-btn.active { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }

/* ── Table ── */
.log-table-wrap {
  background: var(--color-surface);
  border: 1px solid #E9E9E9;
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: none;
  display: flex;
  flex-direction: column;
}
.log-table-wrap table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.log-tbody-scroll {
  max-height: calc(100vh - 220px);
  overflow-y: auto;
  overflow-x: hidden;
  display: block;
  width: 100%;
}
.log-tbody-scroll table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  height: 56px;
  position: sticky; top: 0; z-index: 1;
  background: var(--color-surface);
  padding: var(--space-3) var(--space-5);
  text-align: left;
  font-size:0.8rem; font-weight: 300; font-family:Arial, Helvetica, sans-serif;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--color-text-faint);
  background: #f8f8f8;
  border-bottom: 1px solid var(--color-divider);
}
tbody tr { border-bottom: 1px solid color-mix(in oklch, var(--color-divider) 60%, transparent); transition: background var(--transition-interactive); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f8f8f8; }
tbody tr.new-row { animation: rowEnter 0.4s cubic-bezier(0.16,1,0.3,1) both; }
@keyframes rowEnter { from{opacity:0} to{opacity:1} }
td { padding: var(--space-4) var(--space-5); font-size: var(--text-sm); vertical-align: middle; }
.td-time { color: var(--color-text); font-variant-numeric: tabular-nums; white-space: nowrap; }
.td-common { font-weight: 500; color: var(--color-text); }
.td-scientific { color: var(--color-text-muted); font-style: italic; font-size: var(--text-xs); }

.conf-bar-wrap { display: flex; align-items: center; gap: var(--space-3); }
.conf-bar { flex: 1; max-width: 80px; height: 4px; background: var(--color-surface-dynamic); border-radius: var(--radius-full); overflow: hidden; }
.conf-bar-fill { height: 100%; border-radius: var(--radius-full); background: var(--color-primary); transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
.conf-pct { font-size: var(--text-xs); color: var(--color-text-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ── Column widths (desktop) ── */
.col-time   { width: 18%; }
.col-common { width: 30%; }
.col-sci    { width: 32%; }
.col-conf   { width: 20%; }

/* ── Collage grid ── */
.collage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: var(--space-6);
  padding: var(--space-6) 0;
}
.collage-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--space-5);
  gap: var(--space-3);
  transition: box-shadow var(--transition-interactive), transform var(--transition-interactive);
}
.collage-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.collage-card img {
  width: 100%;
  max-height: 180px;
  object-fit: contain;
}
.collage-card-name {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  color: var(--color-text);
  text-align: center;
}
.collage-card-sci {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-align: center;
  font-style: italic;
}
.collage-card-count {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
}

/* ── Species grid ── */
.species-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-4);
  margin-top: var(--space-10);
}
.species-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  height: auto;
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition-interactive), transform var(--transition-interactive);
}
.species-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.species-count { font-family: var(--font-display); font-size: var(--text-2xl); color: var(--color-text); line-height: 1; margin-bottom: var(--space-2); }
.species-common { font-weight: 500; font-size: var(--text-sm); margin-bottom: var(--space-1); }
.species-sci { font-size: var(--text-xs); color: var(--color-text-muted); font-style: italic; }
.species-best { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: var(--space-2); padding-bottom: 16px;}
.species-audio-btn { font-family: var(--font-body) }

/* Species card play button */

.species-audio-btn {
  padding: var(--space-2) var(--space-5);
  border-radius: var(--radius-full);
  font-size: var(--text-xs); font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  background: var (--colour-surface);
}

.species-audio-btn:hover { background: var(--color-surface-offset); color: var( --color-primary-hover); border-color: var(--color-primary); }
.species-audio-btn.active { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
.species-audio-btn.playing { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary);}

.species-card-img {
  width: 90%;
  object-fit: cover;
  border-radius: calc(var(--radius-lg) - var(--space-5));
  margin-bottom: var(--space-3);
  background: var(--color-surface-offset);
}

/* ── Empty state ── */
.empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: var(--space-20) var(--space-8); color: var(--color-text-muted); }
.empty-state svg { margin-bottom: var(--space-6); opacity: 0.25; }
.empty-state h3 { font-family: var(--font-display); font-weight: 400; font-size: var(--text-lg); color: var(--color-text); margin-bottom: var(--space-2); }
.empty-state p { font-size: var(--text-xs); max-width: auto; }

/* ── Config ── */
.config-section { margin-top: var(--space-12); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); overflow: hidden; }
.config-toggle { width: 100%; padding: var(--space-5) var(--space-6); display: flex; align-items: center; justify-content: space-between; font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); }
.config-toggle:hover { background: var(--color-surface-2); color: var(--color-text); }
.config-chevron { transition: transform var(--transition-interactive); }
.config-body { padding: var(--space-6); border-top: 1px solid var(--color-divider); display: none; }
.config-body.open { display: block; }
.config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }
@media (max-width: 540px) { .config-grid { grid-template-columns: 1fr; } }
label { display: block; font-size: var(--text-xs); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: var(--space-2); }
input[type="text"], input[type="number"] {
  width: 100%; padding: var(--space-3) var(--space-4);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font: inherit; font-size: var(--text-sm); color: var(--color-text);
  transition: border-color var(--transition-interactive);
}
input:focus { outline: none; border-color: var(--color-primary); }
.btn-primary { margin-top: var(--space-5); padding: var(--space-3) var(--space-6); background: var(--color-primary); color: var(--color-text-inverse); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; }
.btn-primary:hover { background: var(--color-primary-hover); }

pre.code-block { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-4); font-size: var(--text-xs); overflow-x: auto; margin-bottom: var(--space-5); font-family: 'SF Mono', 'Fira Code', monospace; }
code.inline { font-size: var(--text-xs); background: var(--color-surface-2); border: 1px solid var(--color-border); padding: 2px 6px; border-radius: var(--radius-sm); font-family: 'SF Mono', 'Fira Code', monospace; }

/* ── Mobile ── */
@media (max-width: 640px) {
  .view-nav { padding: var(--space-8) var(--space-4); }
  header { padding: var(--space-3) var(--space-4); }
  main { margin-left: var(--space-4); margin-right: var(--space-4); margin-bottom: var(--space-20);}
  thead th {font-size: 10px;}
  .stats { grid-template-columns: 1fr 1fr; }
  .stat-sub#statBestSpecies { margin-top: 9px; }
  .species-grid { grid-template-columns: 1fr; }

  .log-tbody-scroll { width: 100%; }
  .log-tbody-scroll table { width: 100%; table-layout: fixed; }

  .col-sci { width: 0; }
  .td-scientific, thead th:nth-child(3) {
    padding: 0 !important;
    overflow: hidden;
    white-space: nowrap;
    max-width: 0;
  }

  .col-time   { width: 19%; }
  .col-common { width: 27%; }
  .col-conf   { width: 27%; }
}
  .td-time { font-size: 0.72rem; line-height: 1.4; white-space: nowrap; }
  .td-time span { display: none; }
  .td-common { font-size: 0.8rem; word-break: break-word; }

  .conf-bar-wrap { gap: var(--space-0); }
  .conf-bar { min-width: 30px; max-width: 40px; background: #e9e9e9; margin-right: -5px}
  .conf-pct { font-size: 0.75rem; min-width: 2.5rem; text-align: right; }

  tbody tr { border-bottom: 1px solid #e9e9e9; }
}

</style>
</head>
<body>
  <a href="#main" class="sr-only">Skip to content</a>

<header>
  <a href="#" class="logo" aria-label="The Beaker">
    The Beaker
  </a>
  <div class="header-right">
    <div class="status-dot">
      <span class="dot" id="statusDot"></span>
      <span id="statusLabel">Idle</span>
    </div>
  </div>
</header>

<nav class="view-nav">
  <div class="view-nav-left">
    <button class="view-btn active" id="collageBtn" data-view="collage">Overview</button>
    <button class="view-btn" id="detailedLogBtn" data-view="log">Detailed log</button>
  </div>
</nav>
<main id="main">

  <div id="dashboardExtras">
  <div class="filter-bar" role="group" aria-label="Time filter">
    <button class="filter-btn active" data-hours="24">24 hours</button>
    <button class="filter-btn" data-hours="48">48 hours</button>
    <button class="filter-btn" data-hours="168">7 days</button>
    <button class="filter-btn" data-hours="0">All time</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Detections</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Unique Species</div>
      <div class="stat-value" id="statSpecies">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Detected</div>
      <div class="stat-value" id="statLast" style="font-size:var(--text-m); font-family: var(--font-display); line-height: 20px;">—</div>
      <div class="stat-sub" id="statLastTime" style="padding-top: 28px"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best Confidence</div>
      <div class="stat-value" id="statBest">—</div>
      <div class="stat-sub" id="statBestSpecies" style="padding-top: 14px"></div>
    </div>
  </div>
</div><!-- /dashboardExtras -->

  <span class="section-meta" id="logMeta" style="display:none"></span>

  <div id="viewLog" style="display:none">
  <div class="log-table-wrap">
    <table>
      <colgroup>
        <col class="col-time"><col class="col-common"><col class="col-sci"><col class="col-conf">
      </colgroup>
      <thead>
        <tr>
          <th>Time</th>
          <th>Common Name</th>
          <th>Scientific Name</th>
          <th>Confidence</th>
        </tr>
      </thead>
    </table>
    <div class="log-tbody-scroll">
    <table>
      <colgroup>
        <col class="col-time"><col class="col-common"><col class="col-sci"><col class="col-conf">
      </colgroup>
      <tbody id="logBody">
        <tr><td colspan="4">
          <div class="empty-state">
            <h3>Listening for birds…</h3>
            <p>Detections will appear here once the loop is running and birds are heard.</p>
          </div>
        </td></tr>
      </tbody>
    </table>
    </div><!-- /log-tbody-scroll -->
  </div>
  <div id="logExpandWrap"></div>
  </div><!-- /viewLog -->

  <div id="viewCollage">
    <div class="collage-grid" id="collageGrid">
      <div class="empty-state" style="grid-column:1/-1;padding:var(--space-0) var(--space-0);" id="collageEmpty">
      </div>
    </div>
  </div>

  <div id="speciesSection">
  <div class="section-header">
    <h2 class="section-title">Bird types</h2>
    <span class="section-meta" id="speciesMeta"></span>
  </div>
  <div class="species-grid" id="speciesGrid">
    <div class="empty-state" style="grid-column:1/-1;padding:var(--space-12) var(--space-8)">
      <p style="font-size:var(--text-sm);color:var(--color-text-faint)">No species recorded yet.</p>
    </div>
  </div>
  </div><!-- /speciesSection -->

</main>

<script>
  
(function(){
  document.documentElement.setAttribute('data-theme', 'light');

  const logUrl = 'birdlog.txt';
  const refreshRate = 30;

  let activeHours = 1;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeHours = parseInt(btn.dataset.hours);
      renderFromData();
    });
  });

  let allRows = [];

  function parseLog(text) {
    return text.trim().split('\n')
      .filter(l => l.trim() && !l.startsWith('Timestamp'))
      .map(line => {
        const p = line.split('\t');
        if (p.length < 3) return null;
        return { timestamp: p[0].trim(), common: p[1].trim(), confidence: p[2].trim(), scientific: p[3]?p[3].trim():'' };
      })
      .filter(Boolean)
      .reverse();
  }

  function filterByHours(rows) {
    if (activeHours === 0) return rows;
    const cutoff = new Date(Date.now() - activeHours * 3600 * 1000);
    return rows.filter(r => { const d = new Date(r.timestamp); return !isNaN(d) && d >= cutoff; });
  }

  function confNum(str) {
    const n = parseFloat(str.replace('%',''));
    if (isNaN(n)) return 0;
    return n > 1 ? n : n * 100;
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return isNaN(d) ? ts : d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  function formatDate(ts) {
    const d = new Date(ts);
    return isNaN(d) ? '' : d.toLocaleDateString([], {month:'short',day:'numeric'});
  }
  
  function renderFromData() {
    const filtered = filterByHours(allRows);
    renderLog(allRows);
    renderStats(filtered);
    renderSpecies(filtered);
  }

  function renderLog(rows) {
    const tbody = document.getElementById('logBody');
    document.getElementById('logMeta').textContent = rows.length ? (rows.length + ' detection' + (rows.length !== 1 ? 's' : '')) : '';
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M10 36 C10 36 18 24 28 20 C34 18 40 22 40 22 C40 22 34 17 28 14 C20 11 11 16 9 24 C7 29 10 36 10 36Z"/><circle cx="33" cy="16" r="1.5" fill="currentColor"/></svg>
        <h3>No detections in this window</h3>
        <p>Try a wider time range, or wait for the next scan.</p>
      </div></td></tr>`;
      return;
    }
    const PAGE = 200;
    let logExpanded = false;

    function buildRows() {
      const visible = logExpanded ? rows.slice(0,200) : rows.slice(0, PAGE);
      tbody.innerHTML = visible.map((r,i) => {
        const pct = confNum(r.confidence);
        return `<tr class="${i<3?'new-row':''}">
          <td class="td-time"><span style="color:var(--color-text-faint)">${formatDate(r.timestamp)}</span> ${formatTime(r.timestamp)}</td>
          <td class="td-common">${r.common}</td>
          <td class="td-scientific">${r.scientific}</td>
          <td>
            <div class="conf-bar-wrap">
              <div class="conf-bar"><div class="conf-bar-fill" style="width:${Math.min(100,pct)}%"></div></div>
              <span class="conf-pct">${Math.round(pct)}%</span>
            </div>
          </td>
        </tr>`;
      }).join('');

      const existing = document.getElementById('logExpandBtn');
      if (existing) existing.remove();
      if (false && rows.length > PAGE) {
        const btn = document.createElement('button');
        btn.id = 'logExpandBtn';
        btn.className = 'log-expand-btn';
        const hidden = rows.length - PAGE;
        btn.textContent = logExpanded ? 'Show less ▲' : `Show ${hidden} more ▼`;
        btn.addEventListener('click', () => {
          logExpanded = !logExpanded;
          buildRows();
        });
        document.getElementById('logExpandWrap').appendChild(btn);
      }
    }

    buildRows();
  }

  function renderStats(rows) {
    document.getElementById('statTotal').textContent = rows.length || '—';
    document.getElementById('statSpecies').textContent = new Set(rows.map(r=>r.common)).size || '—';
    if (rows.length) {
      document.getElementById('statLast').textContent = rows[0].common;
      document.getElementById('statLastTime').textContent = formatTime(rows[0].timestamp);
      const best = rows.reduce((a,b) => confNum(a.confidence)>confNum(b.confidence)?a:b);
      document.getElementById('statBest').textContent = Math.round(confNum(best.confidence))+'%';
      document.getElementById('statBestSpecies').textContent = best.common;
    } else {
      document.getElementById('statLast').textContent = '—';
      document.getElementById('statLastTime').textContent = '';
      document.getElementById('statBest').textContent = '—';
      document.getElementById('statBestSpecies').textContent = '';
    }
  }

  function slugify(name) {
    return name.toLowerCase().replace(/[' ]/g, m => m === ' ' ? '_' : '').replace(/-/g, '_');
  }

  function renderSpecies(rows) {
    const grid = document.getElementById('speciesGrid');
    const counts = {}, bestConf = {};
    rows.forEach(r => {
      counts[r.common] = (counts[r.common]||0) + 1;
      const pct = confNum(r.confidence);
      if (!bestConf[r.common] || pct > bestConf[r.common].pct)
        bestConf[r.common] = {pct, scientific: r.scientific};
    });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    document.getElementById('speciesMeta').textContent = sorted.length ? (sorted.length + ' total') : '';
    if (!sorted.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;padding:var(--space-12) var(--space-8)"><p style="font-size:var(--text-sm);color:var(--color-text-faint)">No species recorded yet.</p></div>`;
      return;
    }
    grid.innerHTML = sorted.map(([name,count]) => {
      const b = bestConf[name];
      return `<div class="species-card">
        <img class="species-card-img" src="images/${slugify(name)}.png" alt="${name}" onerror="this.style.display='none'">
        <div class="species-count">${count}</div>
        <div class="species-common">${name}</div>
        <div class="species-sci">${b.scientific}</div>
        <div class="species-best">Best: ${Math.round(b.pct)}% confidence</div>
        <button class="species-audio-btn" onclick="playBirdAudio(this, '${slugify(name)}')">▶&#xFE0E; Listen</button>
      </div>`;
    }).join('');
  }

  function setStatus(live) {
    document.getElementById('statusDot').className = 'dot'+(live?' live':'');
    document.getElementById('statusLabel').textContent = live ? 'Live' : 'Idle';
  }

  function loadLog() {
    fetch(logUrl+'?t='+Date.now())
      .then(r => { if(!r.ok) throw new Error(); return r.text(); })
      .then(text => { allRows = parseLog(text); setStatus(allRows.length>0); renderFromData(); })
      .catch(() => { setStatus(false); if(!allRows.length) renderFromData(); });
  }

  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const view = btn.dataset.view;
      const isLog = view === 'log';
      document.getElementById('viewLog').style.display = isLog ? '' : 'none';
      document.getElementById('viewCollage').style.display = isLog ? 'none' : '';
      document.getElementById('dashboardExtras').style.display = isLog ? 'none' : '';
      document.getElementById('speciesSection').style.display = isLog ? 'none' : '';
    });
  });

  const collageUrl = 'http://localhost:8765/species_images.json';

  function renderCollage(rows) {
    const grid  = document.getElementById('collageGrid');
    const empty = document.getElementById('collageEmpty');
    if (!rows.length) { empty.style.display = ''; return; }

    const counts = {};
    const sci    = {};
    rows.forEach(r => {
      const k = r.common;
      counts[k] = (counts[k] || 0) + 1;
      sci[k] = r.scientific;
    });

    fetch(collageUrl)
      .then(r => r.ok ? r.json() : {})
      .catch(() => ({}))
      .then(imgCache => {
        const species = Object.keys(counts).sort((a,b) => counts[b]-counts[a]);
        if (!species.length) { empty.style.display = ''; return; }
        empty.style.display = 'none';

        [...grid.children].forEach(c => { if (c.id !== 'collageEmpty') c.remove(); });

        species.forEach(name => {
          const key     = slugify(name);
          const imgPath = imgCache[key];
          const card    = document.createElement('div');
          card.className = 'collage-card';

          const imgEl = document.createElement('img');
          if (imgPath) {
            const filename = imgPath.split('/').pop();
            imgEl.src = `images/${filename}`;
            imgEl.alt = name;
          } else {
            imgEl.src = '';
            imgEl.alt = name;
            imgEl.style.cssText = 'width:80px;height:80px;opacity:0.15;filter:grayscale(1)';
          }

          const nameEl  = document.createElement('div');
          nameEl.className = 'collage-card-name';
          nameEl.textContent = name;

          const sciEl   = document.createElement('div');
          sciEl.className = 'collage-card-sci';
          sciEl.textContent = sci[name] || '';

          const cntEl   = document.createElement('div');
          cntEl.className = 'collage-card-count';
          cntEl.textContent = counts[name] === 1 ? '1 detection' : `${counts[name]} detections`;

          card.append(imgEl, nameEl, sciEl, cntEl);
          grid.appendChild(card);
        });
      });
  }


let currentAudio = null;

window.playBirdAudio = function(btn, slug) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    document.querySelectorAll('.species-audio-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.textContent = '▶&#xFE0E; Listen';
    });
  }

  const candidates = Array.from({length: 36}, (_, i) => 65 + i);

  function tryPlay(i) {
    if (i >= candidates.length) {
      btn.textContent = '✕ No audio';
      return;
    }
    const fileName = slug.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('_');
    const audio = new Audio(`AudioResults/${fileName}_${candidates[i]}.wav`);
    audio.play().then(() => {
      currentAudio = audio;
      btn.classList.add('playing');
      btn.textContent = '⏹ Stop';
      audio.onended = () => {
        btn.classList.remove('playing');
        btn.textContent = '▶&#xFE0E; Listen';
        currentAudio = null;
      };
    }).catch(() => tryPlay(i + 1));
  }

  tryPlay(0);
}

  loadLog();
  let pollInterval = setInterval(loadLog, refreshRate * 1000);
})();
</script>
</body>
</html>
